<p v-if="myThreads.length === 0">You haven't joined any threads yet.</p>
<div v-else class="thread-cards">
    <article v-for="obj of myThreads" :key="obj.url" class="thread-card">
        <div class="thread-card-main">
            <h3 class="thread-card-title">{{ obj.value.title }}</h3>
            <p class="thread-card-line thread-card-meta-row" :title="threadMetaTitle(obj)">
                {{ membersOfThread(obj).length }} / {{ obj.value.sizeLimit }} joined · {{ obj.value.tags.length ? obj.value.tags.join(", ") : "No tags" }}
            </p>
            <ThreadCardLastPreview :preview="lastPreviewByChannel[obj.value.channel] ?? null" />
        </div>
        <div class="thread-card-actions thread-card-actions-inline">
            <button type="button" class="thread-card-btn" @click="leaveThread(obj)">Leave</button>
            <button type="button" class="thread-card-btn thread-card-btn-primary" @click="openChat(obj)">Open</button>
        </div>
    </article>
</div>
