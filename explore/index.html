<h2>Create a thread</h2>
<input v-model="newTitle"            placeholder="Title" />
<input v-model="newTagsInput"        placeholder="Tags (comma-separated)" />
<input v-model.number="newSizeLimit" type="number" min="2" placeholder="Size limit" />
<button @click="createThread()" :disabled="!newTitle.trim()">Create</button>

<h2>Browse threads</h2>
<div class="thread-cards">
    <article v-for="obj of threads" :key="obj.url" class="thread-card">
        <div class="thread-card-main">
            <h3 class="thread-card-title">{{ obj.value.title }}</h3>
            <p class="thread-card-line thread-card-members">
                {{ membersOfThread(obj).length }} / {{ obj.value.sizeLimit }} joined
            </p>
            <p class="thread-card-line thread-card-tags">
                {{ obj.value.tags.length ? obj.value.tags.join(", ") : "No tags" }}
            </p>
        </div>
        <div class="thread-card-actions">
            <template v-if="membersOfThread(obj).includes($graffitiSession.value.actor)">
                <button type="button" class="thread-card-btn" @click="openChat(obj)">Open</button>
            </template>
            <template v-else-if="membersOfThread(obj).length >= obj.value.sizeLimit">
                <button type="button" class="thread-card-btn" disabled>Full</button>
            </template>
            <template v-else>
                <button type="button" class="thread-card-btn thread-card-btn-primary" @click="joinThread(obj)">Join</button>
            </template>
        </div>
    </article>
</div>
