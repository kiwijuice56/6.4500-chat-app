<ThreadListToolbar v-model="filterNameInput" search-label="Search by name:" :disabled="isCreating">
    <template #filters>
        <div class="thread-filter-field">
            <span class="thread-card-note thread-filter-label">Filter by tags:</span>
            <input class="thread-create-tags" v-model="filterTagsInput" placeholder="tag1, tag2" :disabled="isCreating" />
        </div>
        <div class="thread-filter-field thread-filter-size-field">
            <span class="thread-card-note thread-filter-label">Filter by size:</span>
            <select class="thread-create-size thread-filter-size" v-model="filterSizeLimit" :disabled="isCreating" aria-label="Filter by chat size">
                <option value="">Any</option>
                <option :value="2">tiny (2)</option>
                <option :value="5">small (5)</option>
                <option :value="10">medium (10)</option>
                <option :value="30">large (30)</option>
            </select>
        </div>
    </template>
</ThreadListToolbar>

<div class="chats-list-body">
<div class="chats-list-body-fill">
<transition name="loading-fade" mode="out-in">
    <div
        v-if="threadsLoading"
        key="explore-loading"
        class="chats-list-loading-overlay"
        role="status"
        aria-label="Loading"
    >
        <span class="loading-indicator"><span class="loading-indicator-icon" aria-hidden="true"></span></span>
    </div>
    <div v-else key="explore-loaded" class="chats-loaded load-reveal-white">
        <div v-if="filteredThreads.length === 0" class="messages-status chats-status">
            {{ hasFiltersApplied ? "No chats with those filters found. Try broadening your search." : "No chats yet. Try making one!" }}
        </div>
        <div v-else class="thread-cards">
            <article v-for="obj of filteredThreads" :key="obj.url" class="thread-card">
                <div class="thread-card-main">
                    <h3 class="thread-card-title">{{ obj.value.title }}</h3>
                    <p class="thread-card-line thread-card-meta-row" :title="threadMetaTitle(obj)">
                        {{ membersOfThread(obj).length }} / {{ obj.value.sizeLimit }} joined · {{ obj.value.tags.length ? obj.value.tags.join(", ") : "No tags" }}
                    </p>
                    <ThreadCardLastPreview :preview="lastPreviewByChannel[obj.value.channel] ?? null" />
                </div>
                <div class="thread-card-actions">
                    <template v-if="membersOfThread(obj).includes($graffitiSession.value.actor)">
                        <span class="thread-card-note">Already joined</span>
                        <button type="button" class="thread-card-btn" @click="openChat(obj)" :disabled="isCreating">Open</button>
                    </template>
                    <template v-else-if="membersOfThread(obj).length >= obj.value.sizeLimit">
                        <button type="button" class="thread-card-btn" disabled>Full</button>
                    </template>
                    <template v-else>
                        <button type="button" class="thread-card-btn thread-card-btn-primary" @click="joinThread(obj)" :disabled="isCreating">Join</button>
                    </template>
                </div>
            </article>
        </div>
    </div>
</transition>
</div>
</div>

<button
    type="button"
    class="thread-create-floating-btn thread-card-btn thread-card-btn-primary"
    @click="isCreateModalOpen = true"
    :disabled="isCreating"
>
    <span class="thread-create-floating-icon" aria-hidden="true"></span>
    <span>Create new chat</span>
</button>

<modal-window :open="isCreateModalOpen" title="Create new chat" @close="isCreateModalOpen = false">
    <section class="thread-create-modal-form">
        <div class="thread-create-modal-field">
            <label class="thread-create-modal-label" for="modal-chat-name">Chat name:</label>
            <input id="modal-chat-name" class="thread-create-title" v-model="newTitle" placeholder="Title" :disabled="isCreating" />
        </div>
        <div class="thread-create-modal-field">
            <label class="thread-create-modal-label" for="modal-chat-tags">Tags (comma-separated):</label>
            <input id="modal-chat-tags" class="thread-create-tags" v-model="newTagsInput" placeholder="Tags (comma-separated)" :disabled="isCreating" />
        </div>
        <div class="thread-create-modal-field">
            <label class="thread-create-modal-label" for="modal-chat-size">Size:</label>
            <select id="modal-chat-size" class="thread-create-size" v-model.number="newSizeLimit" :disabled="isCreating" aria-label="Chat size">
                <option :value="2">tiny (2)</option>
                <option :value="5">small (5)</option>
                <option :value="10">medium (10)</option>
                <option :value="30">large (30)</option>
            </select>
        </div>
    </section>
    <div class="modal-footer">
        <button
            class="thread-card-btn thread-card-btn-primary modal-create-submit-btn"
            @click="submitCreateFromModal()"
            :disabled="isCreating || !newTitle.trim()"
        >{{ isCreating ? "Creating..." : "Create" }}</button>
    </div>
</modal-window>
