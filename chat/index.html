<div v-if="activeThread" class="chat-page">
    <header class="chat-header">
        <div class="chat-header-row">
            <router-link to="/chats" custom v-slot="{ navigate }">
                <button type="button" class="chat-back-btn" @click="navigate" aria-label="Back to threads" title="Back to threads">
                    <span class="chat-back-icon" aria-hidden="true"></span>
                </button>
            </router-link>
            <h2 class="chat-title" :title="activeThread.value.title">{{ activeThread.value.title }}</h2>
            <button type="button" class="thread-card-btn chat-leave-btn" @click="leaveThread()">Leave thread</button>
        </div>
        <p class="thread-card-line thread-card-meta-row chat-header-meta" :title="chatMetaTitle">
            {{ memberActors.length }} / {{ activeThread.value.sizeLimit }} joined · {{ activeThread.value.tags.length ? activeThread.value.tags.join(", ") : "No tags" }}
        </p>
    </header>

    <section ref="scrollBoxEl" class="scroll-box">
        <div v-if="messagesLoading" class="messages-status">Loading messages…</div>
        <div v-else-if="sortedMessages.length === 0" class="messages-status">No messages yet. Say hi!</div>
        <ul v-else class="messages-list">
            <message-bubble
                v-for="obj of sortedMessages"
                :key="obj.url"
                :message="obj"
                :thread-channel="activeThread.value.channel"
                :is-pending="isPendingMessage(obj)"
            />
        </ul>
        <div ref="scrollEndEl" class="scroll-end-anchor" aria-hidden="true"></div>
    </section>

    <section class="message-container">
        <form @submit.prevent="sendMessage()">
            <div class="composer-wrap">
                <input
                    ref="messageInputEl"
                    v-model="myMessage"
                    type="text"
                    placeholder="Message…"
                />
                <button
                    type="submit"
                    class="send-btn"
                    :disabled="!myMessage.trim().length"
                    :aria-label="isComposerBusy ? 'Queueing messages' : 'Send message'"
                    :aria-busy="isComposerBusy"
                    title="Send"
                >
                    <span class="send-icon" aria-hidden="true"></span>
                </button>
            </div>
        </form>
    </section>
</div>
<p v-else>Thread not found.</p>
