<transition name="chat-route-fade" mode="out-in">
<div v-if="activeThread" :key="'chat-' + activeThread.url" class="chat-page">
    <header class="chat-header">
        <div class="chat-header-row">
            <router-link to="/chats" custom v-slot="{ navigate }">
                <button type="button" class="chat-back-btn" @click="navigate" aria-label="Back to chats" title="Back to chats">
                    <span class="chat-back-icon" aria-hidden="true"></span>
                </button>
            </router-link>
            <h2 class="chat-title" :title="activeThread.value.title">{{ activeThread.value.title }}</h2>
            <div class="chat-header-actions">
                <button
                    v-if="isThreadOwner"
                    type="button"
                    class="thread-card-btn chat-delete-thread-btn"
                    @click="deleteThread()"
                    :disabled="isDeletingThread"
                >{{ isDeletingThread ? "Deleting…" : "Delete chat" }}</button>
                <button type="button" class="thread-card-btn chat-leave-btn" @click="leaveThread()">Leave chat</button>
            </div>
        </div>
        <p class="thread-card-line thread-card-meta-row chat-header-meta" :title="chatMetaTitle">
            {{ memberActors.length }} / {{ activeThread.value.sizeLimit }} joined · {{ activeThread.value.tags.length ? activeThread.value.tags.join(", ") : "No tags" }}
        </p>
    </header>

    <section ref="scrollBoxEl" class="scroll-box scroll-box--loadable">
        <div class="scroll-box-inner">
            <transition name="loading-fade" mode="out-in">
                <div
                    v-if="messagesLoading"
                    key="messages-loading"
                    class="scroll-box-loading-overlay"
                    role="status"
                    aria-label="Loading messages"
                >
                    <span class="loading-indicator"><span class="loading-indicator-icon" aria-hidden="true"></span></span>
                </div>
                <div v-else key="messages-loaded" class="scroll-box-loaded load-reveal-white">
                    <div v-if="sortedMessages.length === 0" class="messages-status">No messages yet. Say hi!</div>
                    <ul v-else class="messages-list">
                        <message-bubble
                            v-for="obj of sortedMessages"
                            :key="messageBubbleKey(obj)"
                            :message="obj"
                            :thread-channel="activeThread.value.channel"
                            :is-pending="isPendingMessage(obj)"
                        />
                        <li class="scroll-end-anchor-wrap" aria-hidden="true">
                            <div ref="scrollEndEl" class="scroll-end-anchor"></div>
                        </li>
                    </ul>
                </div>
            </transition>
        </div>
    </section>

    <section class="message-container">
        <form @submit.prevent="sendMessage()">
            <div class="composer-wrap">
                <input
                    ref="messageInputEl"
                    v-model="myMessage"
                    type="text"
                    placeholder="Message…"
                />
                <button
                    type="submit"
                    class="send-btn"
                    :disabled="!myMessage.trim().length"
                    :aria-label="isComposerBusy ? 'Queueing messages' : 'Send message'"
                    :aria-busy="isComposerBusy"
                    title="Send"
                >
                    <span class="send-icon" aria-hidden="true"></span>
                </button>
            </div>
        </form>
    </section>
</div>
<div v-else-if="threadsLoading" key="chat-route-loading" class="chat-page chat-page-route-loading" role="status" aria-label="Loading chat">
    <div class="chat-route-loading-inner">
        <span class="loading-indicator"><span class="loading-indicator-icon" aria-hidden="true"></span></span>
    </div>
</div>
<div v-else key="chat-not-found" class="messages-status chats-status">Chat not found.</div>
</transition>
