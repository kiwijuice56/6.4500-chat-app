<transition name="modal-fade">
    <div v-if="open" class="modal-overlay" role="presentation" @click.self="emitClose()">
        <section class="modal-card" role="dialog" aria-modal="true">
            <header class="modal-header">
                <button type="button" class="chat-back-btn modal-close-btn" @click="emitClose()" aria-label="Close">
                    <span class="chat-back-icon" aria-hidden="true"></span>
                </button>
                <h3 v-if="title" class="modal-title">{{ title }}</h3>
            </header>
            <div class="modal-body">
                <slot />
            </div>
        </section>
    </div>
</transition>
